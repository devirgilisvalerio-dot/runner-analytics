<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RunnerOS Elite</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0f172a;
    --card:#111827;
    --card2:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#38bdf8;
    --green:#22c55e;
    --orange:#fb923c;
    --red:#ef4444;
    --border:#334155;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(to bottom,#020617,#0f172a);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    padding:20px;
}

.container{
    max-width:1500px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
    flex-wrap:wrap;
    gap:15px;
}

.title h1{
    font-size:34px;
    font-weight:800;
}

.title p{
    color:var(--muted);
    margin-top:5px;
}

.actions{
    display:flex;
    gap:10px;
}

.btn{
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
    color:white;
    transition:0.2s;
}

.btn:hover{
    transform:translateY(-1px);
    opacity:0.95;
}

.primary{
    background:var(--accent);
}

.success{
    background:var(--green);
}

.stats-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:25px;
}

.stat-card{
    background:rgba(17,24,39,0.8);
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
    backdrop-filter:blur(12px);
}

.stat-title{
    color:var(--muted);
    font-size:14px;
    margin-bottom:10px;
}

.stat-value{
    font-size:32px;
    font-weight:800;
}

.stat-sub{
    margin-top:8px;
    color:var(--green);
    font-size:13px;
}

.main-grid{
    display:grid;
    grid-template-columns:1.2fr 2fr;
    gap:20px;
}

.card{
    background:rgba(17,24,39,0.82);
    border:1px solid var(--border);
    border-radius:18px;
    padding:22px;
    margin-bottom:20px;
    backdrop-filter:blur(10px);
}

.card h3{
    margin-bottom:18px;
    font-size:20px;
}

.status{
    font-weight:700;
    color:var(--orange);
}

.shoe-card{
    background:var(--card2);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}

.shoe-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:8px;
}

.bar{
    height:8px;
    background:#1e293b;
    border-radius:999px;
    overflow:hidden;
    margin-top:8px;
}

.fill{
    height:100%;
    background:linear-gradient(to right,var(--green),var(--orange));
}

.table-wrapper{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    color:var(--muted);
    font-size:13px;
    padding-bottom:12px;
}

td{
    padding:14px 0;
    border-top:1px solid rgba(255,255,255,0.05);
    font-size:14px;
}

.badge{
    background:#0ea5e920;
    color:#7dd3fc;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
}

.advisor{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    border:1px solid #1d4ed8;
}

.advisor p{
    margin-bottom:10px;
    line-height:1.5;
}

.chart-box{
    height:350px;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:var(--muted);
    font-size:13px;
}

@media(max-width:1100px){
    .main-grid{ grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="title">
            <h1>RunnerOS Elite</h1>
            <p>Advanced Running Intelligence Platform (Target Folder Engine)</p>
        </div>

        <div class="actions">
            <button id="auth-btn" class="btn primary" onclick="handleAuthClick()">Accedi con Google</button>
            <button id="sync-btn" class="btn success" style="display:none;" onclick="listFiles()">Sincronizza Drive</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-title">KM Totali Rilevati</div>
            <div class="stat-value" id="monthlyKm">0</div>
            <div class="stat-sub" style="color:var(--green)">Dati reali estratti</div>
        </div>

        <div
